<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>scAId Gallery — Explore Community 3D Models</title>
  <meta name="description" content="Explore AI-generated 3D models and CAD blueprints created by the scAId community." />
  <link rel="icon" type="image/png" href="/logo.png" />
  
  <link rel="stylesheet" href="/css/global.css" />
  <link rel="stylesheet" href="/css/landing.css" />
  <link rel="stylesheet" href="/css/gallery.css" />
</head>
<body>
  <!-- ─── Navbar ─────────────────────────────────── -->
  <nav class="navbar" id="navbar">
    <a href="/" class="navbar__logo">
      <img src="/logo.png" alt="scAId logo" class="navbar__logo-icon" style="width:24px; height:24px; object-fit:contain;" />
      scAId
    </a>
    <ul class="navbar__links">
      <li><a href="/">Home</a></li>
      <li><a href="gallery.html" class="active">Gallery</a></li>
      <li><a href="render.html" class="btn btn-secondary nav-cta">Open Editor</a></li>
    </ul>
  </nav>

  <!-- ─── Gallery Hero ────────────────────────────── -->
  <header class="gallery-hero section">
    <div class="container">
      <h1 class="heading-mega glitched" data-text="Community Gallery">Community Gallery</h1>
      <p class="subtitle text-gradient">Explore and get inspired by 3D parametric models generated by the scAId community.</p>
      
      <!-- Upload CTA shown if not logged in / logged in -> link to editor -->
      <div class="gallery-hero__cta">
        <a href="render.html" class="btn btn-primary">Start Designing to Publish</a>
      </div>
    </div>
  </header>

  <!-- ─── Gallery Grid ────────────────────────────── -->
  <main class="gallery-main section">
    <div class="container">
      <div id="gallery-loading" class="gallery-loading">
        <div class="spinner"></div>
        <p>Loading community designs...</p>
      </div>
      
      <div id="gallery-empty" class="gallery-empty" style="display: none;">
        <div class="gallery-empty__icon">🎨</div>
        <h3>No designs yet</h3>
        <p>Be the first to publish a design from the scAId editor!</p>
      </div>

      <div id="gallery-grid" class="gallery-grid" style="display: none;">
        <!-- Inject items here via JS -->
      </div>
    </div>
  </main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.7/gsap.min.js"></script>
  <script type="module" src="/js/gallery.js"></script>
</body>
</html>
